<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo TypeScript Brasaland</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-950 p-8 text-zinc-100">
    <main class="mx-auto max-w-5xl rounded-2xl bg-zinc-900 p-8 shadow-xl">
      <h1 class="text-3xl font-black">Demo de funciones TypeScript</h1>
      <p class="mt-3 text-zinc-400">Ejecuta las operaciones de Brasaland para ver resultados de filtrado, ordenamiento, búsquedas y validaciones.</p>

      <div class="mt-6 grid gap-4 md:grid-cols-2">
        <button id="filter-button" class="rounded-lg bg-amber-500 px-4 py-3 font-semibold text-zinc-950 hover:bg-amber-400">Filtrar por Colombia</button>
        <button id="sort-button" class="rounded-lg bg-red-600 px-4 py-3 font-semibold text-white hover:bg-red-500">Ordenar por nombre</button>
        <button id="search-button" class="rounded-lg bg-emerald-600 px-4 py-3 font-semibold text-white hover:bg-emerald-500">Buscar email</button>
        <button id="validate-button" class="rounded-lg bg-sky-600 px-4 py-3 font-semibold text-white hover:bg-sky-500">Validar registro</button>
      </div>

      <section class="mt-6 rounded-xl border border-zinc-800 bg-zinc-800 p-4">
        <h2 class="text-lg font-semibold">Resultados</h2>
        <pre id="demo-output" class="mt-3 overflow-x-auto rounded-lg bg-zinc-950 p-4 text-sm"></pre>
      </section>
    </main>

    <script type="module" src="./dist/demo.js"></script>
  </body>
</html>
